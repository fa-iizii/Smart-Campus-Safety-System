<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SCSS | Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join the Smart Campus Safety System</p>
        <div class="input-group">
            <input type="text" id="reg-username" placeholder="Choose Username">
            <input type="password" id="reg-password" placeholder="Choose Password">
        </div>
        <button onclick="handleRegister()" class="primary-btn">Register</button>
        <p class="foot-note">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
        async function handleRegister() {
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;

            if(!u || !p) return alert("Please fill in all fields");

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            const data = await res.json();
            if (res.ok) {
                alert("Registration successful! Redirecting to login...");
                window.location.href = 'login.html';
            } else {
                alert(data.error || "Registration failed");
            }
        }
    </script>
</body>
</html>
