<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCSS | Dispatch Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>body { margin: 0; }</style> </head>
<body>
    <div class="sec-layout">
        <aside class="sec-sidebar">
            <div class="sec-sidebar-header">
                <h3>Active Incident Reports</h3>
                <button onclick="location.href='security.html'" style="margin-top: 10px; padding: 5px; font-size: 12px; width: 100%;">⬅ Back to Dashboard</button>
            </div>
            <div id="user-list" class="sec-user-list">
                </div>
        </aside>

        <main class="sec-main">
            <header class="sec-chat-header">
                <h2 id="target-name">Select a report to begin responding</h2>
            </header>
            
            <div id="chat-box" class="sec-chat-box">
                </div>

            <div class="sec-input-container">
                <div class="sec-quick-replies" id="quick-replies" style="display: none;">
                    <button class="sec-quick-btn" onclick="insertQuickReply('Sending a security team to your location immediately.')">Send Help</button>
                    <button class="sec-quick-btn" onclick="insertQuickReply('Can you provide a physical description of the person or hazard?')">Ask Description</button>
                    <button class="sec-quick-btn" onclick="insertQuickReply('Please move to a safe distance and await further instructions.')">Advise Safety</button>
                </div>

                <div class="sec-input-row">
                    <input type="text" id="msg" placeholder="Reply to student..." disabled>
                    <button onclick="send()" class="sec-send-btn" id="send-btn" disabled>Send Reply</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let selectedId = null;
        const token = localStorage.getItem('token');

        // Check if logged in
        if (!token) window.location.href = 'login.html';

        async function loadUsers() {
            try {
                const res = await fetch('/api/chat/active-users', { headers: { 'Authorization': `Bearer ${token}` } });
                const users = await res.json();
                
                document.getElementById('user-list').innerHTML = users.map(u => 
                    // Add 'active' class if this is the currently selected user
                    `<div class="sec-user-item ${selectedId === u.id ? 'active' : ''}" onclick="selectUser(${u.id}, '${u.username}')">
                        <h4>Report ID: ${u.id} - ${u.username}</h4>
                        <p>User Account</p>
                    </div>`
                ).join('');
            } catch(e) { console.error("Failed to load users"); }
        }

        function selectUser(id, name) {
            selectedId = id;
            document.getElementById('target-name').innerText = `Responding to: ${name}`;
            
            // Enable inputs now that a user is selected
            document.getElementById('msg').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('quick-replies').style.display = 'flex';
            
            loadUsers(); // Refresh list to apply the blue 'active' highlight
            loadChat();
        }

        async function loadChat() {
            if(!selectedId) return;
            try {
                const res = await fetch('/api/chat/history', { headers: { 'Authorization': `Bearer ${token}` } });
                const allMsgs = await res.json();
                
                const filtered = allMsgs.filter(m => m.sender_id == selectedId || m.receiver_id == selectedId);
                const box = document.getElementById('chat-box');
                
                box.innerHTML = filtered.map(m => `
                    <div class="sec-msg ${m.sender_name === 'security_admin' ? 'sent' : 'received'}">
                        ${m.message_content ? `<span>${m.message_content}</span>` : ''}
                        ${m.image_path ? `<br><img src="/${m.image_path}" style="max-width: 200px; border-radius: 5px; margin-top: 8px;">` : ''}
                    </div>
                `).join('');
                
                // Auto-scroll to bottom only if we're not currently scrolling up
                if(box.scrollHeight - box.scrollTop - box.clientHeight < 100) {
                    box.scrollTop = box.scrollHeight;
                }
            } catch(e) { console.error("Failed to load chat"); }
        }

        async function send() {
            const inputField = document.getElementById('msg');
            const content = inputField.value.trim();
            
            if(!selectedId || !content) return;
            
            const fd = new FormData();
            fd.append('message_content', content);
            fd.append('receiver_id', selectedId);
            
            try {
                await fetch('/api/chat/send', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
                inputField.value = '';
                loadChat();
            } catch(e) { alert("Failed to send message"); }
        }

        // --- Quick Reply Feature ---
        function insertQuickReply(text) {
            const inputField = document.getElementById('msg');
            inputField.value = text;
            inputField.focus(); // Keep the cursor ready in case they want to add more text
        }

        // Run data fetching loops
        setInterval(loadUsers, 5000); 
        setInterval(loadChat, 3000);
        loadUsers();
    </script>
</body>
</html>
