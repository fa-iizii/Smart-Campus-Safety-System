<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SCSS | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">
    <div class="auth-card">
        <h2>SCSS Portal</h2>
        <p>Login to your account</p>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button onclick="handleLogin()" class="primary-btn">Sign In</button>
        <p class="foot-note">Don't have an account? <a href="register.html">Register</a></p>
    </div>
    <script src="login.js"></script>
</body>
</html>
