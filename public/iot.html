<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCSS | Modular IoT Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#0A192F', light: '#112240' }, gold: { DEFAULT: '#C5A059', light: '#D4AF37' }, surface: '#FAFAFA' } } } }
    </script>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
    
    <div class="max-w-6xl mx-auto py-10 px-6 fade-up">
        
        <header class="flex justify-between items-center mb-10 border-b border-slate-200 pb-6">
            <h2 class="text-3xl italic font-serif text-navy m-0">Central Device Hub</h2>
            <div class="flex gap-4">
                <button onclick="toggleModal(true)" class="bg-gold text-white px-5 py-2.5 rounded text-xs tracking-widest uppercase premium-hover hover:bg-gold-light border border-transparent">
                    + Register Sensor
                </button>
                <button onclick="location.href='security.html'" class="bg-transparent text-navy px-5 py-2.5 rounded text-xs tracking-widest uppercase hover:bg-slate-100 border border-slate-200 transition-colors">
                    Back
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="glass-panel p-8 rounded-xl col-span-1 lg:col-span-1 border border-slate-200">
                <h3 class="text-lg italic font-serif text-navy mb-6 border-b border-slate-100 pb-3">Registered Devices</h3>
                <div id="device-list" class="flex flex-col">
                    <p class="text-sm font-light text-slate-400 italic">Loading devices...</p>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-xl col-span-1 lg:col-span-2 border border-slate-200 flex flex-col">
                <h3 class="text-lg italic font-serif text-navy mb-6 border-b border-slate-100 pb-3">System Telemetry & Filtering</h3>
                
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <input type="text" id="search-filter" placeholder="Search Location or Device..." oninput="applyFilters()" class="flex-grow px-4 py-3 bg-white border border-slate-200 rounded text-sm font-light text-navy focus:outline-none focus:border-gold transition-colors">
                    
                    <select id="status-filter" onchange="applyFilters()" class="px-4 py-3 bg-white border border-slate-200 rounded text-sm font-light text-navy focus:outline-none focus:border-gold transition-colors min-w-[200px] appearance-none">
                        <option value="ALL">All Statuses</option>
                        <option value="OPEN">Opened Doors</option>
                        <option value="CLOSED">Closed Doors</option>
                    </select>
                </div>

                <div class="overflow-x-auto bg-white rounded border border-slate-200 flex-grow">
                    <table class="w-full text-left text-sm font-light">
                        <thead class="bg-slate-50 text-xs uppercase tracking-wider text-slate-500 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 font-medium">Time</th>
                                <th class="px-6 py-4 font-medium">Device Name</th>
                                <th class="px-6 py-4 font-medium">Location</th>
                                <th class="px-6 py-4 font-medium">Temp (°C)</th>
                                <th class="px-6 py-4 font-medium">Humidity</th>
                                <th class="px-6 py-4 font-medium">Status</th>
                            </tr>
                        </thead>
                        <tbody id="sensor-data" class="divide-y divide-slate-100 text-navy">
                            <tr><td colspan="6" class="px-6 py-8 text-center italic text-slate-400">Awaiting telemetry data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="iot.js"></script>

    <div id="reg-modal" class="iot-modal-overlay">
        <div class="bg-white p-10 rounded-xl w-full max-w-md shadow-2xl border border-slate-100">
            <h3 class="text-2xl italic font-serif text-navy mb-8 border-b border-slate-100 pb-4">Register Sensor</h3>
            
            <div class="flex flex-col gap-5 mb-8">
                <div>
                    <label class="block text-xs uppercase tracking-wider font-medium text-slate-400 mb-2">Hardware Device ID</label>
                    <input type="text" id="reg-id" placeholder="e.g., ESP32_LIB_02" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded text-sm font-light focus:outline-none focus:border-gold transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider font-medium text-slate-400 mb-2">Friendly Name</label>
                    <input type="text" id="reg-name" placeholder="e.g., Library Main Exit" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded text-sm font-light focus:outline-none focus:border-gold transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider font-medium text-slate-400 mb-2">Building Assignment</label>
                    <select id="reg-loc" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded text-sm font-light focus:outline-none focus:border-gold transition-colors appearance-none">
                        <option value="">-- Select a Building --</option>
                        <option value="3M Buckley Innovation Centre (BIC)">3M Buckley Innovation Centre (BIC)</option>
                        <option value="Atkinson Holt (AH)">Atkinson Holt (AH)</option>
                        <option value="Brontë Lecture Theatres (BL)">Brontë Lecture Theatres (BL)</option>
                        <option value="Charles Sikes Building (CS)">Charles Sikes Building (CS)</option>
                        <option value="Barbara Hepworth Building (BH)">Barbara Hepworth Building (BH)</option>
                        <option value="Student Central (SC)">Student Central (SC)</option>
                        <option value="Oastler Building (OA)">Oastler Building (OA)</option>
                        <option value="Schwann Building (SB)">Schwann Building (SB)</option>
                        </select>
                </div>
            </div>
            
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <button onclick="toggleModal(false)" class="px-6 py-2.5 rounded text-xs tracking-widest uppercase font-medium text-slate-500 hover:bg-slate-100 transition-colors">Cancel</button>
                <button onclick="submitRegistration()" class="bg-navy text-surface px-6 py-2.5 rounded text-xs tracking-widest uppercase hover:bg-navy-light transition-colors">Register</button>
            </div>
        </div>
    </div>
</body>
</html>
