<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCSS | Report Incident</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#0A192F', light: '#112240' }, gold: { DEFAULT: '#C5A059', light: '#D4AF37' }, surface: '#FAFAFA' } } } }
    </script>
</head>
<body class="flex justify-center items-center h-screen">
    <div class="glass-panel w-full max-w-2xl h-[90vh] rounded-xl flex flex-col overflow-hidden fade-up">
        
        <header class="bg-white/50 border-b border-slate-200 p-6 flex justify-between items-center relative backdrop-blur-md z-10">
            <div>
                <h2 class="text-xl italic font-serif text-navy m-0">Chat with Security</h2>
                <div class="text-xs font-medium text-slate-400 mt-1 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-gold inline-block"></span> Secure Channel
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="triggerChatDeletion()" class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors bg-white px-3 py-1.5 border border-slate-200 rounded">🗑️ Clear</button>
                <button onclick="location.href='user-portal.html'" class="text-xs font-medium text-navy bg-white px-4 py-1.5 border border-slate-200 rounded hover:border-gold transition-colors">Back</button>
            </div>
        </header>

        <div id="chat-box" class="flex-grow p-6 overflow-y-auto flex flex-col gap-2"></div>

        <div class="bg-slate-50 border-t border-slate-200 p-3 text-center">
            <button class="text-xs font-medium text-navy hover:text-gold transition-colors uppercase tracking-wider" onclick="insertTemplate()">+ Insert Format Template</button>
        </div>

        <div class="bg-white p-4 flex gap-3 items-center border-t border-slate-200">
            <label for="img" id="file-label" class="cursor-pointer text-xl text-slate-400 hover:text-navy transition-colors px-2" title="Attach Image">📷</label>
            <input type="file" id="img" class="hidden" onchange="updateFileStatus()">
            
            <input type="text" id="msg" placeholder="Explain your situation..." class="flex-grow px-4 py-3 bg-slate-50 border border-slate-200 rounded text-sm font-light text-navy focus:outline-none focus:border-gold transition-colors">
            
            <button onclick="send()" class="bg-navy text-surface px-6 py-3 rounded text-xs tracking-widest uppercase hover:bg-navy-light transition-colors">Send</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        function insertTemplate() {
            const msgInput = document.getElementById('msg');
            msgInput.value = "Location: [ enter location ] | Description: [ describe ] | Severity: [ give rating out 10 eg: 8/10 ]";
            msgInput.focus();
        }

        function updateFileStatus() {
            document.getElementById('file-label').innerText = '📎'; 
        }

        async function load() {
            try {
                const res = await fetch('/api/chat/history', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                const box = document.getElementById('chat-box');
                
                box.innerHTML = data.map(m => `
                    <div class="usr-msg ${m.sender_name === 'security_admin' ? 'received' : 'sent'}">
                        ${m.message_content ? `<span>${m.message_content}</span>` : ''}
                        ${m.image_path ? `<br><img src="/${m.image_path}" class="max-w-full rounded mt-2 border border-slate-200/20">` : ''}
                    </div>
                `).join('');
                
                if(box.scrollHeight - box.scrollTop - box.clientHeight < 100) { box.scrollTop = box.scrollHeight; }
            } catch(e) { console.error(e); }
        }

        async function send() {
            const msgInput = document.getElementById('msg');
            const imgInput = document.getElementById('img');
            
            if (!msgInput.value.trim() && !imgInput.files[0]) return;

            const fd = new FormData();
            if (msgInput.value.trim()) fd.append('message_content', msgInput.value);
            if (imgInput.files[0]) fd.append('image', imgInput.files[0]);

            try {
                await fetch('/api/chat/send', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
                msgInput.value = '';
                imgInput.value = '';
                document.getElementById('file-label').innerText = '📷';
                load();
            } catch(e) { alert("Failed to send message"); }
        }

        async function triggerChatDeletion() {
            const isConfirmed = confirm("Are you sure? This will permanently delete all messages and photos.");
            if (!isConfirmed) return; 

            try {
                const res = await fetch('/api/chat/delete-chat', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const chatBox = document.getElementById('chat-box'); 
                    if(chatBox) {
                        chatBox.innerHTML = `
                            <div class="text-center text-slate-400 mt-10 text-sm font-light italic">
                                <p>Chat history securely erased.</p>
                            </div>
                        `;
                    }
                } else {
                    const data = await res.json();
                    alert(`Error: ${data.error}`);
                }
            } catch (err) { alert("Failed to reach the server."); }
        }

        setInterval(load, 3000); 
        load();
    </script>
</body>
</html>
